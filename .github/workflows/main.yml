name: Windows Desktop - NoMachine + Tailscale

on:
  workflow_dispatch:

jobs:
  desktop:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      # ──────────────────────────────────────────────
      # STEP 1: Show login credentials at the START
      # ──────────────────────────────────────────────
      - name: 🔐 Show Credentials (READ THIS FIRST)
        run: |
          $line = "=" * 46
          Write-Host $line
          Write-Host "   YOUR REMOTE DESKTOP CREDENTIALS"
          Write-Host $line
          Write-Host ""
          Write-Host "   Username : $env:USERNAME"
          Write-Host "   Password : ${{ secrets.RDP_PASSWORD }}"
          Write-Host ""
          Write-Host "   Save these now before session starts!"
          Write-Host ""
          Write-Host "   Tailscale IP will appear in Step 6 logs."
          Write-Host ""
          Write-Host $line
        shell: powershell

      # ──────────────────────────────────────────────
      # STEP 2: Set password
      # ──────────────────────────────────────────────
      - name: 🔑 Set RDP Password
        run: |
          $user = $env:USERNAME
          $pass = "${{ secrets.RDP_PASSWORD }}"
          net user $user $pass
          Write-Host "Password set for user: $user"
        shell: powershell

      # ──────────────────────────────────────────────
      # STEP 3: Enable RDP
      # ──────────────────────────────────────────────
      - name: 🖥️ Enable RDP
        run: |
          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" -Value 0

          Write-Host "RDP enabled on port 3389"
        shell: powershell

      # ──────────────────────────────────────────────
      # STEP 4: Install NoMachine Server
      # ──────────────────────────────────────────────
      - name: 📦 Install NoMachine Server
        run: |
          $url  = "https://web9001.nomachine.com/download/9.7/Windows/nomachine_9.7.3_1_x64.exe"
          $dest = "C:\nomachine_setup.exe"

          Write-Host "Downloading NoMachine 9.7.3..."
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing

          # Verify the file downloaded correctly
          $fileSize = (Get-Item $dest).Length
          Write-Host "Downloaded file size: $fileSize bytes"

          if ($fileSize -lt 1MB) {
            Write-Host "ERROR: File too small, download likely failed"
            exit 1
          }

          # Verify it's a valid PE executable
          $bytes = [System.IO.File]::ReadAllBytes($dest)
          $magic = [System.Text.Encoding]::ASCII.GetString($bytes[0..1])
          if ($magic -ne "MZ") {
            Write-Host "ERROR: Downloaded file is not a valid Windows executable (magic: $magic)"
            exit 1
          }

          Write-Host "File verified as valid Windows executable"
          Write-Host "Installing NoMachine silently..."

          $proc = Start-Process -FilePath $dest `
            -ArgumentList "/verysilent /norestart" `
            -Wait `
            -PassThru

          Write-Host "Installer exit code: $($proc.ExitCode)"
          Start-Sleep -Seconds 20

          # Find install path
          $paths = @(
            "C:\Program Files\NoMachine",
            "C:\Program Files (x86)\NoMachine"
          )

          $found = $false
          foreach ($p in $paths) {
            if (Test-Path "$p\bin\nxserver.exe") {
              Write-Host "NoMachine found at: $p"
              $found = $true

              # Start NX service if not running
              & "$p\bin\nxserver.exe" --startup 2>&1
              Start-Sleep -Seconds 5
              & "$p\bin\nxserver.exe" --status 2>&1
              break
            }
          }

          if (-not $found) {
            Write-Host "NoMachine binary not found, checking all installed programs..."
            Get-ChildItem "C:\Program Files" -Directory | Select-Object Name
          }

          # Open firewall for NX protocol
          New-NetFirewallRule `
            -DisplayName "NoMachine NX Port 4000" `
            -Direction Inbound `
            -LocalPort 4000 `
            -Protocol TCP `
            -Action Allow | Out-Null

          # Also open port 4080 (NoMachine web) and 4443 (NoMachine HTTPS)
          New-NetFirewallRule `
            -DisplayName "NoMachine Web Port 4080" `
            -Direction Inbound `
            -LocalPort 4080 `
            -Protocol TCP `
            -Action Allow | Out-Null

          Write-Host "Firewall rules added for ports 4000 and 4080"
        shell: powershell

      # ──────────────────────────────────────────────
      # STEP 5: Install apps via Chocolatey
      # ──────────────────────────────────────────────
      - name: 📦 Install Brave Browser
        run: |
          Write-Host "Installing Brave..."
          choco install brave -y --no-progress
          Write-Host "Brave installed"
        shell: powershell

      - name: 📦 Install VSCodium
        run: |
          Write-Host "Installing VSCodium..."
          choco install vscodium -y --no-progress
          Write-Host "VSCodium installed"
        shell: powershell

      - name: 📦 Install Antigravity IDE
        run: |
          Write-Host "Downloading Antigravity IDE..."

          $url  = "https://edgedl.me.gvt1.com/edgedl/release2/j0qc3/antigravity/stable/2.1.1-6123990880747520/windows-x64/Antigravity%20IDE.exe"
          $dest = "C:\Antigravity%20IDE.exe"

          try {
            Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
            Write-Host "Installing Antigravity IDE silently..."
            Start-Process -FilePath $dest `
              -ArgumentList "--silent" `
              -Wait
            Write-Host "Antigravity IDE installed"
          } catch {
            Write-Host "Direct download failed. Trying winget..."
            try {
              winget install --id AntigravityIDE.Antigravity -e --silent --accept-package-agreements --accept-source-agreements
              Write-Host "Antigravity IDE installed via winget"
            } catch {
              Write-Host "winget also failed. Trying choco as fallback..."
              choco install antigravity -y --no-progress 2>$null
              Write-Host "Check chocolatey.log for details"
            }
          }
        shell: powershell

      # ──────────────────────────────────────────────
      # STEP 6: Install and connect Tailscale
      # ──────────────────────────────────────────────
      - name: 📡 Install Tailscale
        run: |
          $url  = "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe"
          $dest = "C:\tailscale_setup.exe"

          Write-Host "Downloading Tailscale..."
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing

          Write-Host "Installing Tailscale..."
          Start-Process -FilePath $dest `
            -ArgumentList "/install /quiet" `
            -Wait

          Start-Sleep -Seconds 10
          Write-Host "Tailscale installed"
        shell: powershell

      - name: 📡 Connect Tailscale + Show Full Connection Info
        run: |
          Start-Service -Name "Tailscale" -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 5

          $ts = @(
            "C:\Program Files\Tailscale\tailscale.exe",
            "C:\Program Files (x86)\Tailscale\tailscale.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $ts) {
            $ts = (Get-Command tailscale -ErrorAction SilentlyContinue).Source
          }

          if (-not $ts) {
            Write-Host "tailscale.exe not found!"
            exit 1
          }

          $authKey = "${{ secrets.TAILSCALE_AUTHKEY }}"
          & $ts up `
            --authkey=$authKey `
            --hostname="github-runner-windows" `
            --accept-routes

          Start-Sleep -Seconds 12

          $tsIP = (& $ts ip -4 2>&1).Trim()

          $sep  = "=" * 50
          $sep2 = "-" * 50

          Write-Host ""
          Write-Host $sep
          Write-Host "   WINDOWS REMOTE DESKTOP - CONNECTION INFO"
          Write-Host $sep
          Write-Host ""
          Write-Host "   Tailscale IP  : $tsIP"
          Write-Host "   Username      : $env:USERNAME"
          Write-Host "   Password      : ${{ secrets.RDP_PASSWORD }}"
          Write-Host ""
          Write-Host "   [NoMachine - RECOMMENDED]"
          Write-Host "   Protocol : NX"
          Write-Host "   Host     : $tsIP"
          Write-Host "   Port     : 4000"
          Write-Host "   User     : $env:USERNAME"
          Write-Host "   Pass     : ${{ secrets.RDP_PASSWORD }}"
          Write-Host ""
          Write-Host "   [Standard RDP - Backup]"
          Write-Host "   Host     : $tsIP"
          Write-Host "   Port     : 3389"
          Write-Host "   User     : $env:USERNAME"
          Write-Host "   Pass     : ${{ secrets.RDP_PASSWORD }}"
          Write-Host ""
          Write-Host "   NoMachine Client: https://www.nomachine.com/download"
          Write-Host ""
          Write-Host "   Apps Installed:"
          Write-Host "   - Brave Browser"
          Write-Host "   - VSCodium"
          Write-Host "   - Antigravity IDE"
          Write-Host ""
          Write-Host $sep
        shell: powershell

      # ──────────────────────────────────────────────
      # STEP 7: Verify everything is running
      # ──────────────────────────────────────────────
      - name: 🔍 Verify All Services
        run: |
          Write-Host "-- Ports Listening --"
          netstat -an | findstr "3389 4000 LISTENING"

          Write-Host ""
          Write-Host "-- Services Status --"
          @("TermService", "Tailscale") | ForEach-Object {
            $svc = Get-Service -Name $_ -ErrorAction SilentlyContinue
            if ($svc) {
              Write-Host "$_ : $($svc.Status)"
            } else {
              Write-Host "$_ : NOT FOUND"
            }
          }

          Write-Host ""
          Write-Host "-- Installed Apps Check --"

          $apps = @{
            "Brave"       = @("C:\Program Files\BraveSoftware\Brave-Browser\Application\brave.exe")
            "VSCodium"    = @(
              "C:\Program Files\VSCodium\VSCodium.exe",
              "C:\Users\$env:USERNAME\AppData\Local\Programs\VSCodium\VSCodium.exe"
            )
            "Antigravity" = @(
              "C:\Program Files\Antigravity\Antigravity.exe",
              "C:\Users\$env:USERNAME\AppData\Local\Programs\Antigravity\Antigravity.exe"
            )
          }

          foreach ($app in $apps.GetEnumerator()) {
            $found = $false
            foreach ($path in $app.Value) {
              if (Test-Path $path) {
                Write-Host "$($app.Key) found at: $path"
                $found = $true
                break
              }
            }
            if (-not $found) {
              Write-Host "$($app.Key) not found at expected paths"
            }
          }

          Write-Host ""
          Write-Host "-- NoMachine Status --"
          $nxPaths = @(
            "C:\Program Files\NoMachine\bin\nxserver.exe",
            "C:\Program Files (x86)\NoMachine\bin\nxserver.exe"
          )
          foreach ($nx in $nxPaths) {
            if (Test-Path $nx) {
              & $nx --status 2>&1 | Select-Object -First 5
              break
            }
          }
        shell: powershell

      # ──────────────────────────────────────────────
      # STEP 8: Keep alive with heartbeat
      # ──────────────────────────────────────────────
      - name: ⏳ Keep Session Alive (~6 hours)
        run: |
          Write-Host ""
          Write-Host "Session is LIVE and ready!"
          Write-Host "Connect using the info shown in Step 6"
          Write-Host "Auto-expires in ~6 hours"
          Write-Host "To end early: cancel this workflow run"
          Write-Host ""

          $start   = Get-Date
          $maxMins = 345
          $interval = 60

          while ($true) {
            $elapsed  = (Get-Date) - $start
            $elMins   = [math]::Floor($elapsed.TotalMinutes)
            $elHrs    = [math]::Floor($elapsed.TotalHours)
            $elMinRem = $elapsed.Minutes
            $remaining = $maxMins - $elMins

            if ($elMins -ge $maxMins) {
              Write-Host "Max session time reached. Ending."
              break
            }

            Write-Host "Uptime: ${elHrs}h ${elMinRem}m | Remaining: ~${remaining} min | Session alive..."
            Start-Sleep -Seconds $interval
          }
        shell: powershell
